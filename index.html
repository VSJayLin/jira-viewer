<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ODM KTC · IFPG1-2 Development Document</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f5f7;--surf:#fff;--surf2:#f8f9fa;--bdr:#dfe1e6;--text:#172b4d;--muted:#6b778c;--dim:#42526e;--acc:#0052CC;--acc2:#0065ff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-weight:300;min-height:100vh;}
.topbar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:13px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.logo{width:22px;height:22px;background:#0052CC;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo svg{width:13px;height:13px;fill:white;}
.tb-title{font-size:13px;font-weight:500;}
.tb-sep{width:1px;height:18px;background:var(--bdr);}
.tb-sub{font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
.tb-ts{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
.refresh-btn{margin-left:auto;display:flex;align-items:center;gap:6px;padding:6px 14px;background:transparent;border:1px solid var(--bdr);border-radius:6px;color:var(--dim);font-size:12px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .15s;}
.refresh-btn:hover{border-color:#0052CC;color:#0052CC;}
.refresh-btn:disabled{opacity:.5;cursor:not-allowed;}
.refresh-btn svg{width:13px;height:13px;}
.refresh-btn.loading svg{animation:spin .7s linear infinite;}
.wrap{max-width:1140px;margin:0 auto;padding:24px 28px 60px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.stat{background:var(--surf);border:1px solid var(--bdr);border-radius:8px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.stat-n{font-size:26px;font-weight:500;font-family:'IBM Plex Mono',monospace;}
.stat-l{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.06em;}
.filter-bar{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:16px 18px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.filter-bar-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-family:'IBM Plex Mono',monospace;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.filter-bar-title::after{content:'';flex:1;height:1px;background:var(--bdr);}
.filter-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
.filter-group{display:flex;flex-direction:column;gap:5px;min-width:140px;}
.filter-group.wide{min-width:200px;flex:1;}
.fg-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-family:'IBM Plex Mono',monospace;}
.fg-select,.fg-input{background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;font-family:'IBM Plex Mono',monospace;outline:none;transition:border-color .15s;width:100%;}
.fg-select:focus,.fg-input:focus{border-color:#0052CC;}
.fg-input::placeholder{color:var(--muted);}
.filter-actions{display:flex;gap:8px;align-items:flex-end;margin-left:auto;}
.btn-reset{padding:7px 14px;background:transparent;border:1px solid var(--bdr);border-radius:6px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .15s;white-space:nowrap;}
.btn-reset:hover{border-color:var(--dim);color:var(--text);}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:#deebff;border:1px solid #b3d4ff;border-radius:12px;font-size:11px;color:#0052CC;font-family:'IBM Plex Mono',monospace;}
.chip-x{cursor:pointer;opacity:.6;font-size:13px;line-height:1;}
.chip-x:hover{opacity:1;}
.tbl-wrap{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);}
table{width:100%;border-collapse:collapse;}
thead tr{border-bottom:1px solid var(--bdr);}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-family:'IBM Plex Mono',monospace;background:var(--surf2);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--bdr);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#f0f4ff;}
td{padding:10px 14px;font-size:13px;vertical-align:middle;}
.td-type{font-size:15px;width:36px;}
.td-key a{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#0052CC;text-decoration:none;white-space:nowrap;}
.td-key a:hover{text-decoration:underline;}
.td-summary{max-width:380px;}
.td-summary a{color:var(--text);text-decoration:none;}
.td-summary a:hover{color:#0052CC;}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap;font-family:'IBM Plex Mono',monospace;}
.badge-todo{background:#f4f5f7;color:#42526e;border:1px solid #dfe1e6;}
.badge-progress{background:#fffae6;color:#974f0c;border:1px solid #ffe380;}
.badge-done{background:#e3fcef;color:#006644;border:1px solid #abf5d1;}
.td-assignee{display:flex;align-items:center;gap:7px;}
.av{width:22px;height:22px;border-radius:50%;background:#deebff;border:1px solid #b3d4ff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;color:#0052CC;flex-shrink:0;overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;}
.av-name{font-size:12px;color:var(--dim);white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis;}
.td-date{font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace;white-space:nowrap;}
.tbl-footer{padding:9px 14px;font-size:11px;color:var(--muted);border-top:1px solid var(--bdr);background:var(--surf2);font-family:'IBM Plex Mono',monospace;}
.state-box{padding:56px 0;text-align:center;color:var(--muted);font-size:13px;}
.spinner{width:24px;height:24px;border:2px solid var(--bdr);border-top-color:#0052CC;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
.err{color:#bf2600;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><svg viewBox="0 0 24 24"><path d="M11.571 11.513H0a5.218 5.218 0 005.232 5.215h2.13v2.056A5.215 5.215 0 0012.575 24V12.518a1.005 1.005 0 00-1.004-1.005zm5.723-5.756H5.757a5.215 5.215 0 005.214 5.214h2.13v2.057a5.215 5.215 0 005.215 5.214V6.762a1.005 1.005 0 00-1.022-1.005zM23.013 0H11.455a5.215 5.215 0 005.215 5.215h2.129v2.057A5.215 5.215 0 0024 12.486V1.005A1.005 1.005 0 0023.013 0z"/></svg></div>
  <span class="tb-title">ODM KTC</span>
  <div class="tb-sep"></div>
  <span class="tb-sub">IFPG1-2 · Development Document</span>
  <span class="tb-ts" id="tb-ts"></span>
  <button class="refresh-btn" id="refreshBtn" onclick="fetchTickets()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
    重新整理
  </button>
</div>

<div class="wrap">
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-tot">—</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n" id="s-todo" style="color:#42526e">—</div><div class="stat-l">To Do / 新建立</div></div>
    <div class="stat"><div class="stat-n" id="s-prog" style="color:#974f0c">—</div><div class="stat-l">In Progress</div></div>
    <div class="stat"><div class="stat-n" id="s-done" style="color:#006644">—</div><div class="stat-l">Done / 完成</div></div>
  </div>

  <div class="filter-bar">
    <div class="filter-bar-title">進階篩選</div>
    <div class="filter-row">
      <div class="filter-group wide">
        <div class="fg-label">關鍵字搜尋</div>
        <input class="fg-input" id="f-keyword" placeholder="搜尋 key、標題..." oninput="applyFilters()">
      </div>
      <div class="filter-group">
        <div class="fg-label">狀態 Status</div>
        <select class="fg-select" id="f-status" onchange="applyFilters()"><option value="">全部</option></select>
      </div>
      <div class="filter-group">
        <div class="fg-label">負責人 Assignee</div>
        <select class="fg-select" id="f-assignee" onchange="applyFilters()"><option value="">全部</option></select>
      </div>
      <div class="filter-group">
        <div class="fg-label">類型 Type</div>
        <select class="fg-select" id="f-type" onchange="applyFilters()">
          <option value="">全部</option>
          <option value="Story">📋 Story</option>
          <option value="Sub-task">↳ Sub-task</option>
          <option value="Bug">🐛 Bug</option>
          <option value="Task">✅ Task</option>
          <option value="Epic">⚡ Epic</option>
        </select>
      </div>
      <div class="filter-group">
        <div class="fg-label">更新時間</div>
        <input class="fg-input" id="f-date" type="date" oninput="applyFilters()">
      </div>
      <div class="filter-actions">
        <button class="btn-reset" onclick="resetFilters()">✕ 清除篩選</button>
      </div>
    </div>
    <div class="filter-chips" id="chips"></div>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th></th><th>Key</th><th>Summary</th><th>Status</th><th>Assignee</th><th>Updated</th>
      </tr></thead>
      <tbody id="tbody">
        <tr><td colspan="6"><div class="state-box"><div class="spinner"></div>載入中...</div></td></tr>
      </tbody>
    </table>
    <div class="tbl-footer" id="footer"></div>
  </div>
</div>

<script>
// ── 設定：指向 Render server，不含任何 token ──
const SERVER = 'https://jira-viewer-amap.onrender.com';
const PROJECT = 'OK';

const TYPE_ICON = {Story:'📋',Bug:'🐛',Task:'✅','Sub-task':'↳',Epic:'⚡'};
let allIssues = [];

function badgeCls(cat){
  if(cat==='indeterminate') return 'badge-progress';
  if(cat==='done') return 'badge-done';
  return 'badge-todo';
}
function initials(n){ return n?n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase():'?'; }
function fmtDate(s){ return s?s.slice(0,10):'—'; }

async function fetchTickets(){
  setLoading(true);
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '<tr><td colspan="6"><div class="state-box"><div class="spinner"></div>從 Jira 載入最新資料...</div></td></tr>';

  try {
    let issues = [], pageToken = '';
    do {
      const u = `${SERVER}/tickets?project=${PROJECT}${pageToken?'&pageToken='+encodeURIComponent(pageToken):''}`;
      const res = await fetch(u);
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if(data.errorMessages) throw new Error(data.errorMessages[0]);
      issues = issues.concat(data.issues || []);
      pageToken = data.isLast === false ? data.nextPageToken : '';
    } while(pageToken);

    allIssues = issues.map(i => ({
      key:       i.key,
      summary:   i.fields.summary || '',
      status:    i.fields.status?.name || '',
      statusCat: i.fields.status?.statusCategory?.key || 'new',
      assignee:  i.fields.assignee?.displayName || '',
      avatar:    i.fields.assignee?.avatarUrls?.['24x24'] || '',
      type:      i.fields.issuetype?.name || 'Story',
      updated:   fmtDate(i.fields.updated),
      url:       `https://viewsonic-vsi.atlassian.net/browse/${i.key}`
    }));

    document.getElementById('tb-ts').textContent = '　最後同步：' + new Date().toLocaleTimeString('zh-TW');
    buildDropdowns();
    updateStats();
    applyFilters();

  } catch(err){
    tbody.innerHTML = `<tr><td colspan="6"><div class="state-box err">❌ 無法載入資料：${err.message}<br><small style="color:#6b778c;margin-top:6px;display:block">請確認 Render 服務正在運作</small></div></td></tr>`;
  }
  setLoading(false);
}

function buildDropdowns(){
  const statuses  = [...new Set(allIssues.map(i=>i.status))].sort();
  const assignees = [...new Set(allIssues.map(i=>i.assignee).filter(Boolean))].sort();
  const sS = document.getElementById('f-status');
  const sA = document.getElementById('f-assignee');
  sS.innerHTML = '<option value="">全部</option>';
  sA.innerHTML = '<option value="">全部</option>';
  statuses.forEach(s  => { const o=document.createElement('option');o.value=s;o.textContent=s;sS.appendChild(o); });
  assignees.forEach(a => { const o=document.createElement('option');o.value=a;o.textContent=a;sA.appendChild(o); });
}

function updateStats(){
  const t=allIssues.length;
  const p=allIssues.filter(i=>i.statusCat==='indeterminate').length;
  const d=allIssues.filter(i=>i.statusCat==='done').length;
  document.getElementById('s-tot').textContent  = t;
  document.getElementById('s-todo').textContent = t-p-d;
  document.getElementById('s-prog').textContent = p;
  document.getElementById('s-done').textContent = d;
}

function applyFilters(){
  const kw   = document.getElementById('f-keyword').value.trim().toLowerCase();
  const stat = document.getElementById('f-status').value;
  const asgn = document.getElementById('f-assignee').value;
  const type = document.getElementById('f-type').value;
  const date = document.getElementById('f-date').value;

  let filtered = allIssues.filter(i => {
    if(kw   && !i.key.toLowerCase().includes(kw) && !i.summary.toLowerCase().includes(kw)) return false;
    if(stat && i.status   !== stat) return false;
    if(asgn && i.assignee !== asgn) return false;
    if(type && i.type     !== type) return false;
    if(date && i.updated  <  date)  return false;
    return true;
  });

  filtered.sort((a,b)=>{
    const na=parseInt(a.key.replace(/\D/g,''))||0;
    const nb=parseInt(b.key.replace(/\D/g,''))||0;
    return na-nb;
  });

  renderTable(filtered);
  renderChips(kw,stat,asgn,type,date);
  document.getElementById('footer').textContent = filtered.length+' / '+allIssues.length+' 筆 tickets';
}

function renderTable(data){
  const tbody = document.getElementById('tbody');
  if(!data.length){
    tbody.innerHTML='<tr><td colspan="6"><div class="state-box">沒有符合條件的 ticket</div></td></tr>';
    return;
  }
  tbody.innerHTML = data.map(i=>`
    <tr>
      <td class="td-type" title="${i.type}">${TYPE_ICON[i.type]||'📄'}</td>
      <td class="td-key"><a href="${i.url}" target="_blank">${i.key}</a></td>
      <td class="td-summary"><a href="${i.url}" target="_blank">${i.summary.replace(/</g,'&lt;')}</a></td>
      <td><span class="badge ${badgeCls(i.statusCat)}">${i.status}</span></td>
      <td class="td-assignee">
        <div class="av">${i.avatar?`<img src="${i.avatar}" alt="">`:initials(i.assignee)}</div>
        <span class="av-name">${i.assignee||'未指派'}</span>
      </td>
      <td class="td-date">${i.updated}</td>
    </tr>`).join('');
}

function renderChips(kw,stat,asgn,type,date){
  const chips=document.getElementById('chips');
  chips.innerHTML='';
  const add=(label,fn)=>{
    const c=document.createElement('span');
    c.className='chip';
    c.innerHTML=label+` <span class="chip-x" onclick="${fn}">×</span>`;
    chips.appendChild(c);
  };
  if(kw)   add('關鍵字：'+kw,   "document.getElementById('f-keyword').value='';applyFilters()");
  if(stat) add('狀態：'+stat,   "document.getElementById('f-status').value='';applyFilters()");
  if(asgn) add('負責人：'+asgn, "document.getElementById('f-assignee').value='';applyFilters()");
  if(type) add('類型：'+type,   "document.getElementById('f-type').value='';applyFilters()");
  if(date) add('更新時間≥'+date,"document.getElementById('f-date').value='';applyFilters()");
}

function resetFilters(){
  ['f-keyword','f-status','f-assignee','f-type','f-date'].forEach(id=>document.getElementById(id).value='');
  applyFilters();
}

function setLoading(on){
  const btn=document.getElementById('refreshBtn');
  btn.disabled=on;
  btn.classList.toggle('loading',on);
}

// 自動載入
fetchTickets();
</script>
</body>
</html>
